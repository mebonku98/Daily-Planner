name: DailyPlanner
options:
  bundleIdPrefix: com.mebonku98
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
targets:
  DailyPlanner:
    type: application
    platform: iOS
    sources:
      - path: DailyPlanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mebonku98.dailyplanner
        PRODUCT_NAME: Daily Planner
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Daily Planner
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
    scheme:
      testTargets:
        - DailyPlannerTests
  DailyPlannerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DailyPlannerTests
    dependencies:
      - target: DailyPlanner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mebonku98.dailyplanner.tests
        GENERATE_INFOPLIST_FILE: YES
